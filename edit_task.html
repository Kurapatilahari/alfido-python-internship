{% extends "base.html" %}
{% block title %}Edit Task - Task Manager{% endblock %}

{% block content %}
<h2>Edit Task</h2>
<form method="POST" action="{{ url_for('edit_task', task_id=task.id) }}" class="mt-3">
    <div class="mb-3">
        <label for="title" class="form-label">Title</label>
        <input type="text" class="form-control" id="title" name="title" value="{{ task.title }}" required>
    </div>
    <div class="mb-3">
        <label for="description" class="form-label">Description (optional)</label>
        <textarea class="form-control" id="description" name="description" rows="3">{{ task.description }}</textarea>
    </div>
    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="done" name="done" {% if task.done %}checked{% endif %}>
        <label class="form-check-label" for="done">Mark as done</label>
    </div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
